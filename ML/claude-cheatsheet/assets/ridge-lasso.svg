<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 150" font-family="system-ui,sans-serif">
  <rect width="420" height="150" fill="#f8fafc" rx="8"/>
  <text x="210" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">Ridge vs Lasso Updates</text>
  <rect x="30" y="40" width="170" height="95" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="115" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">Ridge L2</text>
  <text x="115" y="78" text-anchor="middle" font-size="10" fill="#1e3a5f">J = MSE + lambda*sum(theta^2)</text>
  <text x="115" y="96" text-anchor="middle" font-size="9" fill="#64748b">shrinks weights, rarely zero</text>
  <rect x="220" y="40" width="170" height="95" rx="6" fill="#f3e8ff" stroke="#7c3aed"/>
  <text x="305" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Lasso L1</text>
  <text x="305" y="78" text-anchor="middle" font-size="10" fill="#1e3a5f">J = MSE + lambda*sum(|theta|)</text>
  <text x="305" y="96" text-anchor="middle" font-size="9" fill="#64748b">can zero weights - feature selection</text>
</svg>
