<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" font-family="system-ui,sans-serif">
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/></marker></defs>
  <rect width="520" height="140" fill="#f8fafc" rx="8"/>
  <text x="260" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">Gradient Descent - One Iteration</text>
  <rect x="20" y="40" width="90" height="44" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="65" y="58" text-anchor="middle" font-size="10" fill="#1e3a5f">Predict</text>
  <text x="65" y="72" text-anchor="middle" font-size="9" fill="#64748b">h = theta^T x</text>
  <line x1="110" y1="62" x2="130" y2="62" stroke="#2563eb" marker-end="url(#a)"/>
  <rect x="130" y="40" width="90" height="44" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="175" y="58" text-anchor="middle" font-size="10" fill="#1e3a5f">Error</text>
  <text x="175" y="72" text-anchor="middle" font-size="9" fill="#64748b">e = h - y</text>
  <line x1="220" y1="62" x2="240" y2="62" stroke="#2563eb" marker-end="url(#a)"/>
  <rect x="240" y="40" width="100" height="44" rx="6" fill="#eff6ff" stroke="#2563eb"/>
  <text x="290" y="58" text-anchor="middle" font-size="10" fill="#1e3a5f">Gradient</text>
  <text x="290" y="72" text-anchor="middle" font-size="9" fill="#64748b">dJ/dtheta</text>
  <line x1="340" y1="62" x2="360" y2="62" stroke="#2563eb" marker-end="url(#a)"/>
  <rect x="360" y="40" width="130" height="44" rx="6" fill="#ecfdf5" stroke="#059669"/>
  <text x="425" y="58" text-anchor="middle" font-size="10" fill="#1e3a5f">Update</text>
  <text x="425" y="72" text-anchor="middle" font-size="9" fill="#64748b">theta -= alpha * grad</text>
  <text x="260" y="115" text-anchor="middle" font-size="11" fill="#7c3aed">Ridge adds (lambda/m)*theta | Lasso adds alpha*lambda*sign(theta)</text>
</svg>
