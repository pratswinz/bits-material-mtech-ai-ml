<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" font-family="system-ui,sans-serif">
  <rect width="380" height="220" fill="#f8fafc" rx="8"/>
  <text x="190" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">Confusion Matrix</text>
  <text x="190" y="42" text-anchor="middle" font-size="10" fill="#64748b">Actual = rows | Predicted = columns</text>
  <text x="155" y="68" font-size="10" fill="#64748b">Pred +</text>
  <text x="255" y="68" font-size="10" fill="#64748b">Pred -</text>
  <rect x="120" y="78" width="90" height="55" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="165" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">TP</text>
  <rect x="210" y="78" width="90" height="55" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="255" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">FN</text>
  <rect x="120" y="133" width="90" height="55" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="165" y="162" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">FP</text>
  <rect x="210" y="133" width="90" height="55" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="255" y="162" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">TN</text>
  <text x="190" y="205" text-anchor="middle" font-size="10" fill="#7c3aed">Prec=TP/(TP+FP) | Rec=TP/(TP+FN) | F1=2PR/(P+R)</text>
</svg>
