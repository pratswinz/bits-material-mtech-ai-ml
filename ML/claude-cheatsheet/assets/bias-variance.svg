<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 180" font-family="system-ui,sans-serif">
  <rect width="440" height="180" fill="#f8fafc" rx="8"/>
  <text x="220" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">Bias-Variance Diagnosis</text>
  <rect x="20" y="40" width="120" height="70" rx="6" fill="#fef2f2" stroke="#dc2626"/>
  <text x="80" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">High Bias</text>
  <text x="80" y="88" text-anchor="middle" font-size="9" fill="#64748b">underfit</text>
  <rect x="160" y="40" width="120" height="70" rx="6" fill="#ecfdf5" stroke="#059669"/>
  <text x="220" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">Good Fit</text>
  <rect x="300" y="40" width="120" height="70" rx="6" fill="#fffbeb" stroke="#d97706"/>
  <text x="360" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">High Variance</text>
  <text x="360" y="88" text-anchor="middle" font-size="9" fill="#64748b">overfit</text>
  <text x="220" y="135" text-anchor="middle" font-size="10" fill="#1e3a5f">Fix bias: more features | Fix variance: Ridge/Lasso, more data</text>
</svg>
