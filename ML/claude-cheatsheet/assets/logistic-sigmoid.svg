<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" font-family="system-ui,sans-serif">
  <rect width="400" height="180" fill="#f8fafc" rx="8"/>
  <text x="200" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">Logistic Regression</text>
  <line x1="50" y1="130" x2="350" y2="130" stroke="#cbd5e1"/>
  <line x1="200" y1="40" x2="200" y2="130" stroke="#cbd5e1" stroke-dasharray="4"/>
  <path d="M 60,125 Q 120,125 160,120 T 240,70 T 340,48" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <text x="200" y="155" text-anchor="middle" font-size="11" fill="#7c3aed">sigma(z) = 1 / (1 + exp(-z)) | threshold z=0 gives p=0.5</text>
  <text x="200" y="172" text-anchor="middle" font-size="10" fill="#64748b">z = theta^T x | update with cross-entropy gradient</text>
</svg>
