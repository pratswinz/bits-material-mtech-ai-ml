<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" font-family="system-ui,sans-serif">
  <rect width="400" height="120" fill="#f8fafc" rx="8"/>
  <text x="200" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">Tom Mitchell - E, T, P</text>
  <rect x="30" y="40" width="100" height="60" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="80" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">E</text>
  <text x="80" y="78" text-anchor="middle" font-size="9" fill="#64748b">Experience</text>
  <text x="80" y="90" text-anchor="middle" font-size="8" fill="#64748b">training data</text>
  <rect x="150" y="40" width="100" height="60" rx="6" fill="#d1fae5" stroke="#059669"/>
  <text x="200" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">T</text>
  <text x="200" y="78" text-anchor="middle" font-size="9" fill="#64748b">Task</text>
  <text x="200" y="90" text-anchor="middle" font-size="8" fill="#64748b">what to do</text>
  <rect x="270" y="40" width="100" height="60" rx="6" fill="#f3e8ff" stroke="#7c3aed"/>
  <text x="320" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">P</text>
  <text x="320" y="78" text-anchor="middle" font-size="9" fill="#64748b">Performance</text>
  <text x="320" y="90" text-anchor="middle" font-size="8" fill="#64748b">accuracy, MSE</text>
</svg>
