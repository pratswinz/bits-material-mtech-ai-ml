<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" font-family="system-ui,sans-serif">
  <rect width="400" height="160" fill="#f8fafc" rx="8"/>
  <text x="200" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">Min-Max Normalization</text>
  <line x1="40" y1="100" x2="360" y2="100" stroke="#cbd5e1" stroke-width="2"/>
  <circle cx="80" cy="100" r="5" fill="#2563eb"/>
  <text x="80" y="120" text-anchor="middle" font-size="9" fill="#64748b">x_min = 0.00</text>
  <circle cx="200" cy="100" r="5" fill="#2563eb"/>
  <text x="200" y="120" text-anchor="middle" font-size="9" fill="#64748b">x</text>
  <circle cx="360" cy="100" r="5" fill="#2563eb"/>
  <text x="360" y="120" text-anchor="middle" font-size="9" fill="#64748b">x_max = 1.00</text>
  <text x="200" y="145" text-anchor="middle" font-size="12" fill="#7c3aed">x_prime = (x - x_min) / (x_max - x_min)</text>
</svg>
