<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" font-family="system-ui,sans-serif">
  <rect width="440" height="200" fill="#f8fafc" rx="8"/>
  <text x="220" y="18" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">PMF (bars) vs CDF (steps)</text>
  <text x="115" y="38" text-anchor="middle" font-size="10" fill="#2563eb">PMF f(x)=P(X=x)</text>
  <line x1="40" y1="150" x2="190" y2="150" stroke="#64748b"/>
  <line x1="40" y1="150" x2="40" y2="55" stroke="#64748b"/>
  <rect x="55" y="120" width="22" height="30" fill="#2563eb" opacity="0.85"/>
  <rect x="85" y="95" width="22" height="55" fill="#2563eb" opacity="0.85"/>
  <rect x="115" y="75" width="22" height="75" fill="#2563eb" opacity="0.85"/>
  <rect x="145" y="110" width="22" height="40" fill="#2563eb" opacity="0.85"/>
  <text x="66" y="165" font-size="8" fill="#64748b">0</text>
  <text x="96" y="165" font-size="8" fill="#64748b">1</text>
  <text x="126" y="165" font-size="8" fill="#64748b">2</text>
  <text x="156" y="165" font-size="8" fill="#64748b">3</text>
  <text x="325" y="38" text-anchor="middle" font-size="10" fill="#059669">CDF F(x)=P(X&lt;=x)</text>
  <line x1="250" y1="150" x2="400" y2="150" stroke="#64748b"/>
  <line x1="250" y1="150" x2="250" y2="55" stroke="#64748b"/>
  <polyline points="250,150 272,150 272,120 294,120 294,65 316,65 316,40 338,40 338,150 400,150" fill="none" stroke="#059669" stroke-width="2"/>
  <text x="272" y="165" font-size="8" fill="#64748b">0</text>
  <text x="294" y="165" font-size="8" fill="#64748b">1</text>
  <text x="316" y="165" font-size="8" fill="#64748b">2</text>
  <text x="338" y="165" font-size="8" fill="#64748b">3</text>
  <text x="220" y="188" text-anchor="middle" font-size="9" fill="#64748b">PMF gives height at each x; CDF accumulates probability left-to-right</text>
</svg>
