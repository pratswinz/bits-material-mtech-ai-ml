<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" font-family="system-ui,sans-serif">
  <rect width="480" height="200" fill="#f8fafc" rx="8"/>
  <text x="240" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">Sampling Methods Decision Tree</text>
  
  <rect x="140" y="40" width="200" height="35" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="240" y="63" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a5f">Do all population units have equal chance?</text>
  
  <line x1="140" y1="75" x2="80" y2="110" stroke="#64748b" stroke-width="2"/>
  <line x1="340" y1="75" x2="400" y2="110" stroke="#64748b" stroke-width="2"/>
  
  <!-- YES branch -->
  <circle cx="80" cy="130" r="15" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="80" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">YES</text>
  
  <rect x="20" y="155" width="120" height="35" rx="4" fill="#d1fae5" stroke="#059669"/>
  <text x="80" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">Simple Random</text>
  <text x="80" y="183" text-anchor="middle" font-size="8" fill="#065f46">Every unit equally likely</text>
  
  <!-- NO branch -->
  <circle cx="400" cy="130" r="15" fill="#fef3f2" stroke="#dc2626" stroke-width="2"/>
  <text x="400" y="135" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">NO</text>
  
  <rect x="335" y="155" width="130" height="35" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="400" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">Non-Probability</text>
  <text x="400" y="183" text-anchor="middle" font-size="8" fill="#7f1d1d">Convenience, quota, judgment</text>
</svg>
