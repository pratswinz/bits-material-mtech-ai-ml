<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" font-family="system-ui,sans-serif">
  <rect width="500" height="220" fill="#f8fafc" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">Normal Distribution 68-95-99.7 Rule</text>
  
  <!-- Normal curve -->
  <path d="M 50 180 Q 100 180 150 80 Q 200 20 250 20 Q 300 20 350 80 Q 400 180 450 180" fill="none" stroke="#2563eb" stroke-width="3"/>
  
  <!-- Mean line -->
  <line x1="250" y1="20" x2="250" y2="185" stroke="#059669" stroke-width="2" stroke-dasharray="5"/>
  <text x="250" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">μ</text>
  
  <!-- ±1σ lines -->
  <line x1="170" y1="90" x2="170" y2="185" stroke="#2563eb" stroke-width="1" stroke-dasharray="2"/>
  <line x1="330" y1="90" x2="330" y2="185" stroke="#2563eb" stroke-width="1" stroke-dasharray="2"/>
  <text x="170" y="202" text-anchor="middle" font-size="9" fill="#2563eb">-σ</text>
  <text x="330" y="202" text-anchor="middle" font-size="9" fill="#2563eb">+σ</text>
  
  <!-- ±2σ lines -->
  <line x1="100" y1="140" x2="100" y2="185" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2"/>
  <line x1="400" y1="140" x2="400" y2="185" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2"/>
  <text x="100" y="202" text-anchor="middle" font-size="9" fill="#7c3aed">-2σ</text>
  <text x="400" y="202" text-anchor="middle" font-size="9" fill="#7c3aed">+2σ</text>
  
  <!-- Percentages -->
  <text x="250" y="45" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">68%</text>
  <text x="135" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">13.5%</text>
  <text x="365" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">13.5%</text>
  
  <rect x="35" y="145" width="90" height="25" rx="4" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="80" y="163" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">95% within</text>
  
  <rect x="375" y="145" width="90" height="25" rx="4" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="420" y="163" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">99.7% within</text>
</svg>
