<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="system-ui,sans-serif">
  <rect width="500" height="280" fill="#f8fafc" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">Hypothesis Testing Workflow</text>
  
  <!-- Step 1 -->
  <rect x="20" y="50" width="100" height="60" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="70" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a5f">Step 1</text>
  <text x="70" y="88" text-anchor="middle" font-size="9" fill="#1e3a5f">State H₀ &amp; H₁</text>
  <text x="70" y="103" text-anchor="middle" font-size="8" fill="#64748b">Null vs Alt</text>
  
  <!-- Step 2 -->
  <rect x="150" y="50" width="100" height="60" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="200" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Step 2</text>
  <text x="200" y="88" text-anchor="middle" font-size="9" fill="#1e3a5f">Pick α level</text>
  <text x="200" y="103" text-anchor="middle" font-size="8" fill="#64748b">Usually 0.05</text>
  
  <!-- Step 3 -->
  <rect x="280" y="50" width="100" height="60" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="330" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">Step 3</text>
  <text x="330" y="88" text-anchor="middle" font-size="9" fill="#1e3a5f">Compute test</text>
  <text x="330" y="103" text-anchor="middle" font-size="8" fill="#64748b">t, z, F, χ²</text>
  
  <!-- Step 4 -->
  <rect x="410" y="50" width="70" height="60" rx="6" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="445" y="70" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">Step 4</text>
  <text x="445" y="88" text-anchor="middle" font-size="9" fill="#1e3a5f">p-value</text>
  <text x="445" y="103" text-anchor="middle" font-size="8" fill="#64748b">vs α</text>
  
  <!-- Arrows -->
  <path d="M 120 80 L 150 80" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 250 80 L 280 80" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 380 80 L 410 80" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Decision box -->
  <rect x="40" y="140" width="420" height="110" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="250" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Decision Rule</text>
  
  <rect x="60" y="175" width="180" height="55" rx="4" fill="#ecfdf5" stroke="#059669"/>
  <text x="150" y="193" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">If p ≤ α</text>
  <text x="150" y="210" text-anchor="middle" font-size="9" fill="#1e3a5f">Reject H₀</text>
  <text x="150" y="224" text-anchor="middle" font-size="8" fill="#64748b">Evidence for H₁</text>
  
  <rect x="260" y="175" width="180" height="55" rx="4" fill="#fef3f2" stroke="#dc2626"/>
  <text x="350" y="193" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">If p &gt; α</text>
  <text x="350" y="210" text-anchor="middle" font-size="9" fill="#1e3a5f">Fail to reject H₀</text>
  <text x="350" y="224" text-anchor="middle" font-size="8" fill="#64748b">Insufficient evidence</text>
  
  <text x="250" y="270" text-anchor="middle" font-size="9" fill="#64748b">p-value = probability of observing data this extreme IF H₀ is true</text>
</svg>
